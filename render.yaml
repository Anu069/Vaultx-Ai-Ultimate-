services:
  - type: web
    name: vaultx
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        value: sqlite:///vaultx.db
      - key: MAIL_SERVER
        sync: false
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USE_TLS
        value: "True"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_DEFAULT_SENDER
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: MAX_LOGIN_ATTEMPTS
        value: "5"
      - key: OTP_EXPIRY_MINUTES
        value: "10"
      - key: SESSION_TIMEOUT_MINUTES
        value: "30"
      - key: GROK_API_KEY
        sync: false
