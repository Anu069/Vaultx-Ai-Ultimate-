{% extends "base.html" %}
{% block title %}Add Password{% endblock %}
{% block breadcrumb %}Passwords / Add{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">Add <span class="accent">Password</span></h1>
</div>
<div class="form-card">
  <form method="POST" action="{{ url_for('vault.add_password') }}" class="vault-form">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Title *</label>
        <input type="text" name="title" class="form-input" placeholder="e.g. Gmail, Netflix" required autofocus/>
      </div>
      <div class="form-group">
        <label class="form-label">Category</label>
        <input type="text" name="category" class="form-input" placeholder="General, Work, Banking…" value="General"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Username / Email</label>
        <input type="text" name="username" class="form-input" placeholder="your@email.com" autocomplete="off"/>
      </div>
      <div class="form-group">
        <label class="form-label">Website URL</label>
        <input type="url" name="url" class="form-input" placeholder="https://example.com"/>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Password *</label>
      <div class="input-wrap">
        <input type="password" name="password" id="newPw" class="form-input" placeholder="Enter or generate a password" required oninput="checkStr(this.value)" autocomplete="new-password"/>
        <button type="button" class="toggle-pw" onclick="togglePw('newPw',this)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="strength-bar-wrap" id="strWrap" style="display:none">
        <div class="strength-bar"><div class="strength-fill" id="strFill"></div></div>
        <span class="strength-label" id="strLabel"></span>
        <div id="strIssues" class="str-issues"></div>
      </div>
      <button type="button" class="btn btn-ghost btn-sm mt-sm" onclick="autoGenerate()">⚡ Generate Strong Password</button>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Tags</label>
        <input type="text" name="tags" class="form-input" placeholder="work, important (comma separated)"/>
      </div>
      <div class="form-group">
        <label class="form-label">Expire In (days)</label>
        <input type="number" name="expires_days" class="form-input" placeholder="e.g. 90" min="1" max="3650"/>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Notes</label>
      <textarea name="notes" class="form-input form-textarea" placeholder="Any additional notes…" rows="3"></textarea>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Save Password</button>
      <a href="{{ url_for('vault.passwords') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
{% block scripts %}
<script>
function togglePw(id, btn) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
}
async function checkStr(pw) {
  if (!pw) { document.getElementById('strWrap').style.display='none'; return; }
  document.getElementById('strWrap').style.display='flex';
  const r = await fetch('/vault/passwords/strength', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
  const d = await r.json();
  document.getElementById('strFill').style.width = d.score+'%';
  document.getElementById('strFill').style.background = d.color;
  document.getElementById('strLabel').textContent = d.label;
  document.getElementById('strLabel').style.color = d.color;
  document.getElementById('strIssues').innerHTML = d.issues.map(i=>`<span class="str-issue">⚠ ${i}</span>`).join('');
}
async function autoGenerate() {
  const r = await fetch('/vault/passwords/generate', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({length:20,upper:true,lower:true,digits:true,symbols:true})});
  const d = await r.json();
  const inp = document.getElementById('newPw');
  inp.value = d.password;
  inp.type = 'text';
  checkStr(d.password);
  showToast('Strong password generated!');
}
</script>
{% endblock %}
