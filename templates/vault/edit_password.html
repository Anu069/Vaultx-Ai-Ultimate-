{% extends "base.html" %}
{% block title %}Edit Password{% endblock %}
{% block breadcrumb %}Passwords / Edit{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">Edit <span class="accent">{{ entry.title }}</span></h1>
</div>
<div class="form-card">
  <form method="POST" class="vault-form">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Title *</label>
        <input type="text" name="title" class="form-input" value="{{ entry.title }}" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Category</label>
        <input type="text" name="category" class="form-input" value="{{ entry.category or 'General' }}"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-input" value="{{ entry.username or '' }}" autocomplete="off"/>
      </div>
      <div class="form-group">
        <label class="form-label">URL</label>
        <input type="url" name="url" class="form-input" value="{{ entry.url or '' }}"/>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">New Password (leave blank to keep current)</label>
      <div class="input-wrap">
        <input type="password" name="password" id="editPw" class="form-input" placeholder="Leave blank to keep current" oninput="checkStr(this.value)" autocomplete="new-password"/>
        <button type="button" class="toggle-pw" onclick="togglePw('editPw',this)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="strength-bar-wrap" id="strWrap" style="display:none">
        <div class="strength-bar"><div class="strength-fill" id="strFill"></div></div>
        <span class="strength-label" id="strLabel"></span>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Tags</label>
      <input type="text" name="tags" class="form-input" value="{{ entry.tags or '' }}"/>
    </div>
    <div class="form-group">
      <label class="form-label">Notes</label>
      <textarea name="notes" class="form-input form-textarea" rows="3">{{ entry.notes or '' }}</textarea>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Update Password</button>
      <a href="{{ url_for('vault.passwords') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
{% block scripts %}
<script>
function togglePw(id,btn){const i=document.getElementById(id);i.type=i.type==='password'?'text':'password';}
async function checkStr(pw){if(!pw){document.getElementById('strWrap').style.display='none';return;}document.getElementById('strWrap').style.display='flex';const r=await fetch('/vault/passwords/strength',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});const d=await r.json();document.getElementById('strFill').style.width=d.score+'%';document.getElementById('strFill').style.background=d.color;document.getElementById('strLabel').textContent=d.label;document.getElementById('strLabel').style.color=d.color;}
</script>
{% endblock %}
