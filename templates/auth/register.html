{% extends "auth/base_auth.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<h2 class="auth-title">Create Vault</h2>
<p class="auth-sub">Set up your secure account</p>

<form method="POST" action="{{ url_for('auth.register') }}" class="auth-form">
  <div class="form-group">
    <label class="form-label">Username</label>
    <div class="input-wrap">
      <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <input type="text" name="username" class="form-input" placeholder="choose a username" required minlength="3" maxlength="30" autocomplete="username"/>
    </div>
  </div>
  <div class="form-group">
    <label class="form-label">Email Address</label>
    <div class="input-wrap">
      <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      <input type="email" name="email" class="form-input" placeholder="your@email.com" required autocomplete="email"/>
    </div>
  </div>
  <div class="form-group">
    <label class="form-label">Master Password</label>
    <div class="input-wrap">
      <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <input type="password" name="password" id="regPassword" class="form-input" placeholder="min 8 characters" required minlength="8" autocomplete="new-password" oninput="liveStrength(this.value)"/>
      <button type="button" class="toggle-pw" onclick="togglePw('regPassword', this)" tabindex="-1">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <div class="strength-bar-wrap" id="strengthWrap" style="display:none">
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <span class="strength-label" id="strengthLabel"></span>
    </div>
  </div>
  <div class="form-group">
    <label class="form-label">Confirm Password</label>
    <div class="input-wrap">
      <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <input type="password" name="confirm_password" id="confirmPassword" class="form-input" placeholder="repeat password" required autocomplete="new-password"/>
    </div>
  </div>
  <button type="submit" class="btn btn-primary btn-full">
    <span>Create Secure Account</span>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </button>
</form>

<div class="auth-links">
  <span>Already have an account?</span>
  <a href="{{ url_for('auth.login') }}" class="auth-link">Login</a>
</div>
{% endblock %}
{% block scripts %}
<script>
function togglePw(id, btn) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.style.opacity = inp.type === 'text' ? '1' : '0.5';
}
async function liveStrength(pw) {
  const wrap = document.getElementById('strengthWrap');
  if (!pw) { wrap.style.display='none'; return; }
  wrap.style.display='flex';
  try {
    const r = await fetch('/vault/passwords/strength', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
    const d = await r.json();
    document.getElementById('strengthFill').style.width = d.score+'%';
    document.getElementById('strengthFill').style.background = d.color;
    document.getElementById('strengthLabel').textContent = d.label;
    document.getElementById('strengthLabel').style.color = d.color;
  } catch(e){}
}
</script>
{% endblock %}
