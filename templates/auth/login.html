{% extends "auth/base_auth.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<h2 class="auth-title">Access Vault</h2>
<p class="auth-sub">Enter your credentials to unlock</p>

<form method="POST" action="{{ url_for('auth.login') }}" class="auth-form" id="loginForm">
  <div class="form-group">
    <label class="form-label">Username or Email</label>
    <div class="input-wrap">
      <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <input type="text" name="identifier" class="form-input" placeholder="username or email" required autocomplete="username" />
    </div>
  </div>
  <div class="form-group">
    <label class="form-label">Password</label>
    <div class="input-wrap">
      <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <input type="password" name="password" id="loginPassword" class="form-input" placeholder="••••••••" required autocomplete="current-password" />
      <button type="button" class="toggle-pw" onclick="togglePw('loginPassword', this)" tabindex="-1">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </div>
  <button type="submit" class="btn btn-primary btn-full">
    <span>Unlock Vault</span>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </button>
</form>

<div class="auth-links">
  <span>New to VaultX?</span>
  <a href="{{ url_for('auth.register') }}" class="auth-link">Create Account</a>
</div>
{% endblock %}

{% block scripts %}
<script>
function togglePw(id, btn) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.style.opacity = inp.type === 'text' ? '1' : '0.5';
}
</script>
{% endblock %}
